name: Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: toolbox-${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
        IMAGE: ${{ steps.build-image.outputs.IMAGE }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # 处理SSH密钥，确保格式正确
        echo "$EC2_KEY" | base64 -d > ec2_key.pem 2>/dev/null || echo "$EC2_KEY" > ec2_key.pem
        chmod 600 ec2_key.pem
        
        # 部署命令
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ec2_key.pem $EC2_USER@$EC2_HOST << EOF
          set -e
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker pull $IMAGE
          docker stop toolbox || true
          docker rm toolbox || true
          docker run -d --name toolbox -p 80:3000 --restart always $IMAGE
          docker system prune -f
        EOF
        
        rm -f ec2_key.pem

    - name: Verify deployment
      run: |
        sleep 30
        curl -f http://${{ secrets.EC2_HOST }} || exit 1
